<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>책표지 인쇄 서비스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }

    .logo {
      font-size: 52px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 22px;
      color: #222;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* 로그인된 경우 */
    #welcomeSection { display: none; }
    .welcome-name {
      font-size: 18px;
      font-weight: 700;
      color: #4f7ef8;
      margin-bottom: 8px;
    }
    .welcome-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    /* 회원가입 폼 */
    #registerSection {}

    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #666;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .form-group input:focus {
      border-color: #4f7ef8;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f7ef8, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-print {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #27ae60, #1a8040);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
      letter-spacing: 0.3px;
    }

    .btn-print:hover { opacity: 0.92; transform: translateY(-1px); }

    .btn-logout {
      background: none;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      margin-top: 16px;
      font-family: inherit;
      text-decoration: underline;
    }

    .btn-logout:hover { color: #888; }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 28px 0;
    }

    .feature-list {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature-chip {
      background: #f5f7ff;
      color: #4f7ef8;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
    }

    .err-msg {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 4px;
      text-align: left;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">📚</div>
  <h1>책표지 인쇄 서비스</h1>
  <p class="subtitle">원하는 책의 표지를 검색하고<br>고화질로 인쇄해 보세요.</p>

  <!-- 회원가입 폼 -->
  <div id="registerSection">
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="nameInput" placeholder="홍길동" maxlength="30"
             onkeydown="if(event.key==='Enter')document.getElementById('emailInput').focus()">
      <div class="err-msg" id="nameErr">이름을 입력해주세요.</div>
    </div>
    <div class="form-group">
      <label>이메일 <span style="color:#bbb;font-weight:400">(선택)</span></label>
      <input type="email" id="emailInput" placeholder="example@email.com"
             onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="btn-primary" onclick="doRegister()">회원가입 후 시작하기 →</button>

    <div class="feature-list">
      <span class="feature-chip">📖 알라딘 도서 검색</span>
      <span class="feature-chip">🖼 고화질 표지</span>
      <span class="feature-chip">🖨 인쇄 최적화</span>
    </div>
  </div>

  <!-- 로그인된 경우 -->
  <div id="welcomeSection">
    <div class="welcome-name" id="welcomeName"></div>
    <div class="welcome-sub">환영합니다! 아래 버튼을 눌러 시작하세요.</div>
    <a href="./books.html" class="btn-print">📚 책표지 인쇄 시작하기</a>
    <br>
    <button class="btn-logout" onclick="doLogout()">다른 계정으로 시작</button>
  </div>
</div>

<script>
  function init() {
    const user = JSON.parse(localStorage.getItem('bcp_user') || 'null');
    if (user && user.name) {
      document.getElementById('registerSection').style.display = 'none';
      document.getElementById('welcomeSection').style.display  = 'block';
      document.getElementById('welcomeName').textContent = user.name + '님 👋';
    }
  }

  function doRegister() {
    const name  = document.getElementById('nameInput').value.trim();
    const email = document.getElementById('emailInput').value.trim();
    const errEl = document.getElementById('nameErr');

    if (!name) {
      errEl.style.display = 'block';
      document.getElementById('nameInput').focus();
      return;
    }
    errEl.style.display = 'none';

    localStorage.setItem('bcp_user', JSON.stringify({ name, email, joinedAt: Date.now() }));
    window.location.href = './books.html';
  }

  function doLogout() {
    localStorage.removeItem('bcp_user');
    document.getElementById('registerSection').style.display = 'block';
    document.getElementById('welcomeSection').style.display  = 'none';
    document.getElementById('nameInput').value  = '';
    document.getElementById('emailInput').value = '';
  }

  init();
</script>

</body>
</html>
