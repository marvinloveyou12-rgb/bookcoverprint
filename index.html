<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>홈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .page { display: none; width: 100%; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
    .page.active { display: flex; }

    .card {
      background: white; border-radius: 18px;
      padding: 44px 48px; width: 100%; max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .card h1 { font-size: 26px; color: #222; margin-bottom: 6px; text-align: center; }
    .card h2 { font-size: 21px; color: #222; margin-bottom: 24px; text-align: center; }
    .card .sub { color: #888; font-size: 14px; text-align: center; margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
    .field input:focus, .field select:focus { border-color: #4f7ef8; }
    .field .err { font-size: 12px; color: #e74c3c; margin-top: 4px; display: none; }

    .birth-row { display: flex; gap: 8px; }
    .birth-row select { flex: 1; }
    .gender-row { display: flex; gap: 14px; }
    .gender-row label { display: flex; align-items: center; gap: 6px; font-weight: normal; font-size: 14px; cursor: pointer; }

    .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-bottom: 8px; }
    .btn:last-child { margin-bottom: 0; }
    .btn-blue   { background: #4f7ef8; color: white; }
    .btn-blue:hover   { background: #3a66d4; }
    .btn-gray   { background: #eee; color: #444; }
    .btn-gray:hover   { background: #ddd; }
    .btn-green  { background: #27ae60; color: white; }
    .btn-green:hover  { background: #1e8449; }

    /* 소셜 로그인 버튼 */
    .social-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: #aaa; font-size: 13px; }
    .social-divider::before, .social-divider::after { content: ''; flex: 1; height: 1px; background: #e5e5e5; }

    .social-btns { display: flex; flex-direction: column; gap: 8px; }
    .social-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 10px 16px;
      border: 1.5px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: white; color: #333;
      text-decoration: none; transition: background 0.15s;
    }
    .social-btn:hover { background: #f7f7f7; }
    .social-btn .icon { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; flex-shrink: 0; }
    .icon-google { background: white; border: 1px solid #ddd; }
    .icon-naver  { background: #03C75A; color: white; font-size: 13px; }
    .icon-kakao  { background: #FEE500; color: #3A1D1D; }

    /* 서버 메시지 */
    .msg { text-align: center; font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-bottom: 14px; display: none; }
    .msg.success { background: #e6f4ea; color: #2d7a3a; display: block; }
    .msg.error   { background: #fdecea; color: #c0392b; display: block; }

    /* 홈 화면 - 로그인 상태 */
    .home-user { text-align: center; margin-bottom: 28px; }
    .home-user .avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; margin: 0 auto 12px; }
    .home-user .welcome { font-size: 18px; font-weight: 700; color: #222; }
    .home-user .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
    .badge-local  { background: #e8f4fd; color: #2980b9; }
    .badge-google { background: #fce8e8; color: #c0392b; }
    .badge-naver  { background: #e8f8ef; color: #0a7a3a; }
    .badge-kakao  { background: #fffbe6; color: #a07800; }

    .menu-btns { display: flex; flex-direction: column; gap: 10px; }
    .menu-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-radius: 12px;
      font-size: 15px; font-weight: 600; color: #333;
      background: #f5f7ff; border: 1.5px solid #e0e6ff;
      text-decoration: none; cursor: pointer;
      transition: background 0.15s;
    }
    .menu-btn:hover { background: #eaefff; }
    .menu-btn .ico { font-size: 22px; }

    .link-row { text-align: center; margin-top: 14px; font-size: 13px; color: #888; }
    .link-row a, .link-row span { color: #4f7ef8; cursor: pointer; text-decoration: none; }
    .link-row a:hover, .link-row span:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- ── 홈 (로그아웃 상태) ── -->
<div class="page active" id="pgHome">
  <div class="card">
    <h1>📚 북커버</h1>
    <p class="sub">책 표지 인쇄 서비스</p>
    <div id="msgHome" class="msg"></div>
    <div id="areaGuest">
      <button class="btn btn-blue" onclick="show('pgLogin')">로그인</button>
      <button class="btn btn-gray" onclick="show('pgSignup')">회원가입</button>
      <div class="social-divider">소셜 계정으로 바로 시작</div>
      <div class="social-btns">
        <a href="/auth/google" class="social-btn">
          <span class="icon icon-google">G</span> 구글 계정으로 로그인
        </a>
        <a href="/auth/naver" class="social-btn">
          <span class="icon icon-naver">N</span> 네이버 계정으로 로그인
        </a>
        <a href="/auth/kakao" class="social-btn">
          <span class="icon icon-kakao">K</span> 카카오 계정으로 로그인
        </a>
      </div>
    </div>
    <div id="areaUser" style="display:none">
      <div class="home-user">
        <div class="avatar">👤</div>
        <div class="welcome" id="welcomeName"></div>
        <span class="badge" id="providerBadge"></span>
      </div>
      <div class="menu-btns">
        <a href="/books.html" class="menu-btn"><span class="ico">📖</span> 책 표지 인쇄</a>
        <div class="menu-btn" onclick="doLogout()"><span class="ico">🚪</span> 로그아웃</div>
      </div>
    </div>
  </div>
</div>

<!-- ── 로그인 ── -->
<div class="page" id="pgLogin">
  <div class="card">
    <h2>로그인</h2>
    <div id="msgLogin" class="msg"></div>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="loginId" placeholder="아이디">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-blue" onclick="doLogin()">로그인</button>
    <button class="btn btn-gray" onclick="show('pgHome')">취소</button>
    <div class="social-divider">소셜 계정으로 로그인</div>
    <div class="social-btns">
      <a href="/auth/google" class="social-btn">
        <span class="icon icon-google">G</span> 구글 계정으로 로그인
      </a>
      <a href="/auth/naver" class="social-btn">
        <span class="icon icon-naver">N</span> 네이버 계정으로 로그인
      </a>
      <a href="/auth/kakao" class="social-btn">
        <span class="icon icon-kakao">K</span> 카카오 계정으로 로그인
      </a>
    </div>
    <div class="link-row">계정이 없으신가요? <span onclick="show('pgSignup')">회원가입</span></div>
  </div>
</div>

<!-- ── 회원가입 ── -->
<div class="page" id="pgSignup">
  <div class="card">
    <h2>회원가입</h2>
    <div id="msgSignup" class="msg"></div>

    <div class="field">
      <label>이름</label>
      <input type="text" id="su_name" placeholder="이름" oninput="validateName()">
      <div class="err" id="e_name">이름에는 숫자를 포함할 수 없습니다.</div>
    </div>
    <div class="field">
      <label>성별</label>
      <div class="gender-row">
        <label><input type="radio" name="gender" value="남성"> 남성</label>
        <label><input type="radio" name="gender" value="여성"> 여성</label>
        <label><input type="radio" name="gender" value="기타"> 기타</label>
      </div>
      <div class="err" id="e_gender">성별을 선택해주세요.</div>
    </div>
    <div class="field">
      <label>생년월일</label>
      <div class="birth-row">
        <select id="su_year"><option value="">년도</option></select>
        <select id="su_month"><option value="">월</option></select>
        <select id="su_day"><option value="">일</option></select>
      </div>
      <div class="err" id="e_birth">생년월일을 모두 선택해주세요.</div>
    </div>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="su_id" placeholder="아이디">
      <div class="err" id="e_id">아이디를 입력해주세요.</div>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="su_pw" placeholder="비밀번호">
      <div class="err" id="e_pw">비밀번호를 입력해주세요.</div>
    </div>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="su_email" placeholder="example@email.com">
      <div class="err" id="e_email">올바른 이메일 주소를 입력해주세요.</div>
    </div>
    <button class="btn btn-blue" onclick="doSignup()">가입 완료</button>
    <button class="btn btn-gray" onclick="show('pgHome')">취소</button>
    <div class="link-row">이미 계정이 있으신가요? <span onclick="show('pgLogin')">로그인</span></div>
  </div>
</div>

<script>
  // ── 페이지 전환 ────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  // ── URL 파라미터 처리 (OAuth 리다이렉트 후 에러 메시지) ──
  const params = new URLSearchParams(location.search);
  if (params.get('msg')) {
    showMsg('msgHome', params.get('msg'), params.get('type') || 'error');
    history.replaceState({}, '', '/');
  }

  // ── 로그인 상태 확인 ───────────────────────────────────
  async function checkMe() {
    const res  = await fetch('/api/me');
    const data = await res.json();
    if (data.logged_in) {
      document.getElementById('areaGuest').style.display = 'none';
      document.getElementById('areaUser').style.display  = 'block';
      document.getElementById('welcomeName').textContent  = data.name + '님';
      const badge = document.getElementById('providerBadge');
      const p = data.oauth_provider || 'local';
      const labels = { local:'일반 계정', google:'구글 계정', naver:'네이버 계정', kakao:'카카오 계정' };
      badge.textContent = labels[p] || p;
      badge.className = 'badge badge-' + p;
    }
  }
  checkMe();

  // ── 로그인 ─────────────────────────────────────────────
  async function doLogin() {
    const userId   = document.getElementById('loginId').value.trim();
    const password = document.getElementById('loginPw').value;
    if (!userId || !password) { showMsg('msgLogin', '아이디와 비밀번호를 입력해주세요.', 'error'); return; }
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId, password}) });
    const data = await res.json();
    if (data.success) { location.reload(); }
    else { showMsg('msgLogin', data.message, 'error'); }
  }

  // ── 로그아웃 ───────────────────────────────────────────
  async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    location.reload();
  }

  // ── 회원가입 ───────────────────────────────────────────
  const yearSel  = document.getElementById('su_year');
  const monthSel = document.getElementById('su_month');
  const daySel   = document.getElementById('su_day');
  const curYear  = new Date().getFullYear();
  for (let y = curYear; y >= 1900; y--) yearSel.innerHTML += `<option value="${y}">${y}년</option>`;
  for (let m = 1; m <= 12; m++) monthSel.innerHTML += `<option value="${m}">${m}월</option>`;
  function updateDays() {
    const y = parseInt(yearSel.value)||2000, mo = parseInt(monthSel.value)||1;
    const max = new Date(y, mo, 0).getDate(), prev = daySel.value;
    daySel.innerHTML = '<option value="">일</option>';
    for (let d = 1; d <= max; d++) daySel.innerHTML += `<option value="${d}"${d==prev?' selected':''}>${d}일</option>`;
  }
  yearSel.addEventListener('change', updateDays);
  monthSel.addEventListener('change', updateDays);
  updateDays();

  function validateName() {
    const val = document.getElementById('su_name').value;
    document.getElementById('e_name').style.display = /\d/.test(val) ? 'block' : 'none';
  }
  function errShow(id, v) { document.getElementById(id).style.display = v ? 'block' : 'none'; }

  async function doSignup() {
    let ok = true;
    const name = document.getElementById('su_name').value.trim();
    if (!name || /\d/.test(name)) { errShow('e_name', true); ok = false; } else errShow('e_name', false);
    const gender = document.querySelector('input[name="gender"]:checked');
    if (!gender) { errShow('e_gender', true); ok = false; } else errShow('e_gender', false);
    const y = yearSel.value, mo = monthSel.value, d = daySel.value;
    if (!y || !mo || !d) { errShow('e_birth', true); ok = false; } else errShow('e_birth', false);
    const userId = document.getElementById('su_id').value.trim();
    if (!userId) { errShow('e_id', true); ok = false; } else errShow('e_id', false);
    const password = document.getElementById('su_pw').value;
    if (!password) { errShow('e_pw', true); ok = false; } else errShow('e_pw', false);
    const email = document.getElementById('su_email').value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errShow('e_email', true); ok = false; } else errShow('e_email', false);
    if (!ok) return;

    const birth = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const res  = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, gender:gender.value, birth, userId, password, email}) });
    const data = await res.json();
    showMsg('msgSignup', data.message, data.success ? 'success' : 'error');
    if (data.success) setTimeout(() => show('pgLogin'), 1500);
  }
</script>
</body>
</html>
